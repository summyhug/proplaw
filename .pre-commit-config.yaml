repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff

  - repo: local
    hooks:
      - id: schema-check
        name: Validate Pydantic schemas
        entry: python -c "import propra.schemas.assessment; import propra.schemas.situation"
        language: system
        pass_filenames: false
