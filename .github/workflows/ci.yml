name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Lint Python
        run: ruff check .

      - name: Validate Pydantic schemas
        run: python -c "import propra.schemas.assessment; import propra.schemas.situation; print('Schemas OK')"

      - name: Run tests with coverage
        run: PYTHONPATH=. pytest propra/tests/ --cov=propra --cov-report=xml

      - name: Upload coverage report to PR
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd propra/frontend
          npm install

      - name: Lint React
        run: |
          cd propra/frontend
          npm run lint

      - name: Build frontend
        run: |
          cd propra/frontend
          npm run build
